<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Playbook — way of working</title>
<meta name="description" content="The portable way of working used to build Shelfie — rules, workflow, adversarial stress tests, docs, hub review, mockups. Reusable on any project." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script>(function(){try{var t=localStorage.getItem('shelfie-theme');if(!t)t=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="stylesheet" href="shelfie.css" />
<style>
  .wrap{max-width:860px;margin:0 auto;padding:44px 20px 90px}
  .nav{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;align-items:center}
  .nav a{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 13px;text-decoration:none;color:var(--green-strong);font-weight:700;font-size:13.5px}
  .nav a.raw{background:var(--green-soft)}
  .intro{background:var(--card-2);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:8px;color:var(--ink-soft);font-size:14px;line-height:1.6}
  .doc h1{font-size:clamp(30px,6vw,44px);margin:26px 0 6px;letter-spacing:-.02em}
  .doc h2{font-size:25px;margin:38px 0 8px;padding-top:14px;border-top:1px solid var(--line)}
  .doc h3{font-size:18px;margin:22px 0 4px;font-family:var(--font-body);font-weight:800}
  .doc h4{font-size:15px;margin:16px 0 2px;font-family:var(--font-body);font-weight:800;color:var(--ink-soft)}
  .doc p,.doc li{font-size:15.5px;line-height:1.65}
  .doc a{color:var(--green-strong)}
  .doc code{background:var(--card-2);border:1px solid var(--line);border-radius:6px;padding:1px 6px;font-family:var(--font-mono);font-size:13px}
  .doc pre{background:var(--card-2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;overflow-x:auto}
  .doc pre code{background:none;border:0;padding:0;font-size:12.5px;line-height:1.5}
  .doc table{width:100%;border-collapse:collapse;margin:14px 0;font-size:14px;display:block;overflow-x:auto}
  .doc th,.doc td{text-align:left;padding:9px 11px;border-bottom:1px solid var(--line);vertical-align:top}
  .doc th{color:var(--ink-faint);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
  .doc blockquote{border-left:3px solid var(--green);background:var(--card-2);margin:12px 0;padding:8px 14px;border-radius:0 10px 10px 0;color:var(--ink-soft)}
  .doc hr{border:0;border-top:2px dashed var(--line);margin:34px 0}
  .doc ul,.doc ol{padding-left:22px}
  .loading{color:var(--ink-soft);font-size:15px;padding:30px 0}
  .fallback{background:var(--amber-soft);border:1px solid var(--line);border-radius:12px;padding:16px 18px;color:var(--amber)}
</style>
</head>
<body>
  <button class="theme-toggle" aria-label="Toggle light/dark"><span class="moon">🌙</span><span class="sun">☀️</span></button>
  <div class="wrap">
    <div class="nav">
      <a href="index.html">← Hub</a>
      <a class="raw" href="PLAYBOOK.md" target="_blank">📄 Raw markdown</a>
      <a href="https://github.com/xCloudy75z/shelfie/tree/main/PLAYBOOK" target="_blank">📁 Portable folder ↗</a>
    </div>
    <div class="intro">
      <strong>The Playbook</strong> is the exact system used to build Shelfie — packaged to be portable to any project. This page is a single-page read; the copy-paste <em>folder</em> (sections + templates) lives at <code>/PLAYBOOK</code> in the repo.
    </div>
    <div id="doc" class="doc">
      <p class="loading">Loading the Playbook…</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script>
    (async function () {
      const el = document.getElementById("doc");
      try {
        const res = await fetch("PLAYBOOK.md", { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const md = await res.text();
        if (typeof marked === "undefined") throw new Error("renderer unavailable");
        el.innerHTML = marked.parse(md);
      } catch (e) {
        el.innerHTML =
          '<div class="fallback">Couldn\'t render the Playbook inline (' +
          (e && e.message ? e.message : e) +
          '). Open the <a href="PLAYBOOK.md">raw markdown</a> instead.</div>';
      }
    })();
  </script>
  <script src="theme.js"></script>
</body>
</html>
