<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Shelfie — Interactive Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script>(function(){try{var t=localStorage.getItem('shelfie-theme');if(!t)t=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<style>
  :root{
    --green:#1f9d57; --green-dark:#146b3c; --green-soft:#e3f3e7;
    --ink:#181a15; --muted:#5b5e52; --line:#e4ddcc; --bg:#f4f1e8;
    --card:#fffdf7; --amber:#d9852a; --red:#cf4630; --shadow:0 16px 40px rgba(30,42,20,.12);
    --ring:#d9d0bd;
    --font-display:"Fraunces",Georgia,serif;
    --font-body:"Hanken Grotesk",system-ui,-apple-system,sans-serif;
    --font-mono:"Spline Sans Mono",ui-monospace,monospace;
    color-scheme:light;
  }
  :root[data-theme="dark"]{
    --green:#42d888; --green-dark:#82ecb0; --green-soft:#16301f;
    --ink:#eaf0e4; --muted:#9daa9b; --line:#28322668; --bg:#0d120e;
    --card:#151b15; --amber:#f1b24e; --red:#f0745b; --shadow:0 18px 46px rgba(0,0,0,.55);
    --ring:#2a352a; color-scheme:dark;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:var(--font-body);transition:background-color .3s,color .3s;
    background:radial-gradient(1200px 600px at 50% -10%,#dff3e9,transparent),var(--bg);color:var(--ink);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 14px 60px}
  .kicker{color:var(--muted);font-size:13px;margin:0 0 14px;text-align:center;max-width:420px}
  .kicker b{color:var(--green-dark)}
  /* Phone frame */
  .phone{width:390px;max-width:100%;height:812px;max-height:calc(100vh - 40px);background:var(--card);
    border-radius:44px;box-shadow:var(--shadow),0 0 0 10px rgba(16,24,40,.06),0 0 0 2px var(--ring);
    position:relative;overflow:hidden;display:flex;flex-direction:column}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:26px;
    background:#101828;border-radius:0 0 18px 18px;z-index:60}
  .screen{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
  .statusbar{height:44px;display:flex;align-items:flex-end;justify-content:space-between;
    padding:0 26px 6px;font-size:13px;font-weight:600;color:var(--ink)}
  .body{flex:1;overflow-y:auto;padding:8px 18px 96px}
  .body::-webkit-scrollbar{width:0}
  h1.title{font-family:var(--font-display);font-weight:600;font-size:30px;margin:6px 2px 2px;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:13px;margin:0 2px 16px}
  /* Tabs */
  .tabbar{position:absolute;left:0;right:0;bottom:0;height:78px;background:#fff;border-top:1px solid var(--line);
    display:flex;padding:8px 10px 20px;z-index:50}
  .tab{flex:1;border:0;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;
    color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;padding-top:6px}
  .tab svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.9}
  .tab.active{color:var(--green-dark)}
  /* Cards & bits */
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;margin:0 0 14px;box-shadow:0 1px 2px rgba(16,24,40,.04)}
  .btn{width:100%;border:0;border-radius:14px;padding:15px;font-size:16px;font-weight:700;cursor:pointer}
  .btn-primary{background:var(--green);color:#fff}
  .btn-primary:active{background:var(--green-dark)}
  .btn-ghost{background:var(--green-soft);color:var(--green-dark)}
  .btn-lite{background:#f2f4f7;color:var(--ink)}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:12px 2px 6px}
  input,select{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:12px;font-size:16px;
    background:#fff;color:var(--ink);font-family:inherit}
  input:focus,select:focus{outline:2px solid var(--green);border-color:var(--green)}
  .row{display:flex;gap:10px}.row>*{flex:1}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:5px 10px;border-radius:999px}
  .pill-green{background:var(--green-soft);color:var(--green-dark)}
  .pill-amber{background:#fef0c7;color:#b54708}
  .pill-red{background:#fee4e2;color:#b42318}
  .muted{color:var(--muted)}.tiny{font-size:12px}.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
  .toggle{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
  .switch{width:46px;height:28px;border-radius:999px;background:#e4e7ec;position:relative;transition:.15s;flex:none}
  .switch.on{background:var(--green)}
  .switch i{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.15s}
  .switch.on i{left:21px}
  .divider{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:12px;margin:16px 2px}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line)}
  .listrow{display:flex;align-items:center;gap:12px;padding:11px 2px;border-bottom:1px solid var(--line)}
  .listrow:last-child{border-bottom:0}
  .listrow .n{font-weight:600}.listrow .amt{margin-left:auto;font-weight:700}
  .avatar{width:36px;height:36px;border-radius:10px;background:var(--green-soft);display:grid;place-items:center;font-size:18px;flex:none}
  .stat{display:flex;flex-direction:column;gap:2px}
  .stat .k{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
  .stat .v{font-size:20px;font-weight:800;letter-spacing:-.01em}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .bar{height:10px;border-radius:999px;background:#eef2f0;overflow:hidden}
  .bar>i{display:block;height:100%;border-radius:999px}
  .catrow{margin:12px 0}
  .catrow .top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
  /* Toast */
  .toast{position:absolute;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);opacity:0;
    background:#101828;color:#fff;padding:12px 18px;border-radius:12px;font-size:14px;font-weight:600;
    transition:.25s;z-index:70;pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  /* Lock screen */
  .lock{position:absolute;inset:0;background:linear-gradient(180deg,#0b3b28,#0f5138);z-index:80;
    display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;transition:.35s}
  .lock.hide{opacity:0;pointer-events:none;transform:scale(1.04)}
  .lock .logo{font-family:var(--font-display);font-size:34px;font-weight:600;letter-spacing:-.02em;margin-bottom:2px}
  .theme-toggle{position:fixed;top:16px;right:16px;z-index:100;width:44px;height:44px;border-radius:50%;
    border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;font-size:19px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);display:grid;place-items:center;transition:transform .2s}
  .theme-toggle:hover{transform:rotate(-18deg) scale(1.06)}
  .theme-toggle .sun{display:none}.theme-toggle .moon{display:block}
  :root[data-theme="dark"] .theme-toggle .sun{display:block}
  :root[data-theme="dark"] .theme-toggle .moon{display:none}
  .lock .cart{font-size:40px;margin-bottom:10px}
  .lock .hint{color:#bfe6d3;font-size:13px;margin-bottom:26px}
  .dots{display:flex;gap:16px;margin-bottom:34px}
  .dot{width:15px;height:15px;border-radius:50%;border:2px solid #7fd3ac}
  .dot.f{background:#fff;border-color:#fff}
  .pad{display:grid;grid-template-columns:repeat(3,72px);gap:16px}
  .key{height:72px;border-radius:50%;background:#ffffff1a;color:#fff;font-size:26px;font-weight:600;border:0;cursor:pointer}
  .key:active{background:#ffffff33}.key.blank{background:none;cursor:default}
  /* Sheet (receipt) */
  .sheet{position:absolute;inset:0;background:#fff;z-index:65;display:flex;flex-direction:column;transform:translateY(100%);transition:.3s}
  .sheet.show{transform:translateY(0)}
  .sheet .sh-head{padding:18px 18px 6px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line)}
  .sheet .sh-body{flex:1;overflow-y:auto;padding:16px 18px 20px}
  .x{margin-left:auto;background:#f2f4f7;border:0;width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;color:var(--muted)}
  .drop{border:2px dashed #cbd5cf;border-radius:16px;padding:34px 16px;text-align:center;color:var(--muted);background:#f8faf9}
  .drop .big{font-size:34px}
  .spin{width:34px;height:34px;border:3px solid var(--green-soft);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto}
  @keyframes spin{to{transform:rotate(360deg)}}
  .hidden{display:none!important}
  .backlink{margin-top:18px;font-size:13px}
  .backlink a{color:var(--green-dark);font-weight:700;text-decoration:none}
</style>
</head>
<body>
  <button class="theme-toggle" aria-label="Toggle light/dark"><span class="moon">🌙</span><span class="sun">☀️</span></button>
  <p class="kicker">📱 <b>Shelfie</b> — tap around. This is a clickable mockup with <b>fake sample groceries</b>, not your data. Enter any 4-digit PIN to start.</p>

  <div class="phone">
    <div class="notch"></div>
    <div class="screen">

      <!-- ===== LOCK SCREEN ===== -->
      <div class="lock" id="lock">
        <div class="cart">🛒</div>
        <div class="logo">Shelfie</div>
        <div class="hint">Enter your PIN</div>
        <div class="dots" id="dots">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="pad" id="pad"></div>
      </div>

      <!-- ===== APP ===== -->
      <div class="statusbar"><span>9:41</span><span>􀙇 􀺤 100%</span></div>
      <div class="body" id="body"><!-- injected --></div>

      <!-- Receipt sheet -->
      <div class="sheet" id="sheet">
        <div class="sh-head">
          <strong id="sheetTitle">Import receipt</strong>
          <button class="x" onclick="closeSheet()">✕</button>
        </div>
        <div class="sh-body" id="sheetBody"></div>
      </div>

      <div class="toast" id="toast">Saved ✓</div>

      <!-- Tab bar -->
      <nav class="tabbar">
        <button class="tab active" data-tab="log" onclick="go('log')">
          <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Log</button>
        <button class="tab" data-tab="prices" onclick="go('prices')">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>Prices</button>
        <button class="tab" data-tab="month" onclick="go('month')">
          <svg viewBox="0 0 24 24"><path d="M4 19V10M10 19V5M16 19v-7M22 19H2"/></svg>Month</button>
      </nav>

    </div>
  </div>

  <p class="backlink"><a href="index.html">← Back to review page</a> &nbsp;·&nbsp; <a href="spec.html">Read the full spec →</a></p>

<script>
/* ---------- PIN pad ---------- */
let pin="";
const pad=document.getElementById("pad");
["1","2","3","4","5","6","7","8","9","","0","⌫"].forEach(d=>{
  const b=document.createElement("button");
  if(d===""){b.className="key blank";}
  else{b.className="key";b.textContent=d;b.onclick=()=>press(d);}
  pad.appendChild(b);
});
function press(d){
  if(d==="⌫"){pin=pin.slice(0,-1);}
  else if(pin.length<4){pin+=d;}
  paintDots();
  if(pin.length===4){setTimeout(()=>{document.getElementById("lock").classList.add("hide");},180);}
}
function paintDots(){
  document.querySelectorAll("#dots .dot").forEach((el,i)=>el.classList.toggle("f",i<pin.length));
}

/* ---------- Toast ---------- */
let tT;
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  clearTimeout(tT);tT=setTimeout(()=>t.classList.remove("show"),1800);}

/* ---------- Tabs ---------- */
const body=document.getElementById("body");
function go(tab){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===tab));
  body.scrollTop=0;
  body.innerHTML=VIEWS[tab]();
  if(tab==="prices") setTimeout(bindShelf,0);
}

/* ---------- Views ---------- */
const VIEWS={
  log:()=>`
    <h1 class="title">Log</h1>
    <p class="sub">Home from the shop? Import the receipt. Just one item? Add it below.</p>
    <button class="btn btn-primary" style="display:flex;align-items:center;justify-content:center;gap:8px" onclick="openReceipt()">
      📄 Import Carrefour receipt (PDF)</button>
    <p class="tiny muted" style="text-align:center;margin:8px 0 0">Reads on your device · a whole trip in one tap</p>
    <div class="divider">or add one item</div>
    <div class="card">
      <label>Item</label>
      <input list="items" placeholder="Start typing… e.g. Milk" value="">
      <datalist id="items">
        <option>Milk 2L</option><option>Eggs 30pc</option><option>Brown Bread</option>
        <option>Bananas 1kg</option><option>Chicken 1kg</option><option>Basmati Rice 5kg</option>
      </datalist>
      <div class="row">
        <div><label>Price (AED)</label><input inputmode="decimal" placeholder="0.00"></div>
        <div><label>Qty</label><input value="1"></div>
      </div>
      <div class="row">
        <div><label>Store</label><select><option selected>Carrefour</option><option>Lulu</option><option>Union Coop</option><option>Other</option></select></div>
        <div><label>Category <span style="color:var(--green-dark)">· auto</span></label><select><option selected>Groceries</option><option>Dairy</option><option>Produce</option><option>Household</option><option>Snacks</option><option>Other</option></select></div>
      </div>
      <div class="toggle"><span class="tiny muted">This was on offer</span>
        <div class="switch" onclick="this.classList.toggle('on')"><i></i></div></div>
      <button class="btn btn-primary" style="margin-top:16px" onclick="toast('Saved ✓  ·  form cleared')">Save purchase</button>
    </div>
    <p class="tiny muted" style="text-align:center">Category auto-fills once an item is known — you set it once, ever.</p>
  `,

  prices:()=>`
    <h1 class="title">Prices</h1>
    <p class="sub">At the shelf — is this a good price?</p>
    <input list="items2" value="Milk 2L" style="margin-bottom:14px">
    <datalist id="items2"><option>Milk 2L</option><option>Eggs 30pc</option><option>Bananas 1kg</option></datalist>
    <div class="card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        <div class="avatar" style="width:44px;height:44px;font-size:22px">🥛</div>
        <div><div style="font-weight:800;font-size:18px">Milk 2L</div>
        <div class="tiny muted">Bought 8 times · usually Carrefour</div></div>
      </div>
      <div class="grid2">
        <div class="stat"><span class="k">Last paid</span><span class="v mono">AED 5.75</span><span class="tiny muted">3 days ago</span></div>
        <div class="stat"><span class="k" style="color:var(--green-dark)">Best ever</span><span class="v mono" style="color:var(--green-dark)">AED 4.99</span><span class="tiny muted">on offer, May</span></div>
        <div class="stat"><span class="k">Average</span><span class="v mono">AED 5.60</span></div>
        <div class="stat"><span class="k">Highest</span><span class="v mono">AED 6.50</span></div>
      </div>
      <svg viewBox="0 0 260 60" style="width:100%;height:56px;margin-top:14px">
        <polyline fill="none" stroke="#12b76a" stroke-width="2.5"
          points="0,40 40,44 80,20 120,30 160,10 200,34 260,28"/>
        <circle cx="260" cy="28" r="3.5" fill="#12b76a"/>
      </svg>
    </div>
    <div class="card">
      <label style="margin-top:0">Price on the shelf right now?</label>
      <div class="row" style="align-items:flex-end">
        <div><input id="shelf" inputmode="decimal" placeholder="AED" value="5.20"></div>
        <div style="flex:0 0 auto"><button class="btn btn-ghost" style="padding:13px 18px" onclick="checkShelf()">Check</button></div>
      </div>
      <div id="verdict" style="margin-top:14px"></div>
    </div>
    <div class="card">
      <div class="tiny muted" style="font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Recent buys</div>
      <div class="listrow"><span class="n">Carrefour</span><span class="muted tiny">3 days ago</span><span class="amt mono">AED 5.75</span></div>
      <div class="listrow"><span class="n">Carrefour</span><span class="muted tiny">2 weeks ago</span><span class="amt mono">AED 5.50</span></div>
      <div class="listrow"><span class="n">Lulu</span><span class="muted tiny">1 month ago</span><span class="amt mono">AED 4.99</span></div>
    </div>
  `,

  month:()=>`
    <h1 class="title">Month</h1>
    <div style="display:flex;align-items:center;gap:8px;margin:0 2px 14px">
      <button class="btn-lite" style="border:0;border-radius:8px;padding:6px 10px;cursor:pointer">‹</button>
      <strong>July 2026</strong>
      <button class="btn-lite" style="border:0;border-radius:8px;padding:6px 10px;cursor:pointer">›</button>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <span class="tiny muted" style="font-weight:700;text-transform:uppercase;letter-spacing:.04em">Spent this month</span>
        <span class="pill pill-green">On track</span>
      </div>
      <div style="font-size:34px;font-weight:800;letter-spacing:-.02em;margin:6px 0 2px">AED 1,240<span class="muted" style="font-size:18px;font-weight:600"> / 1,500</span></div>
      <div class="bar" style="margin:10px 0 6px"><i style="width:82%;background:var(--green)"></i></div>
      <div class="tiny muted">You're pacing to finish around <b>AED 1,460</b> — just under budget.</div>
    </div>
    <div class="card">
      <div class="tiny muted" style="font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">Where it went</div>
      ${cat("Groceries","560",".37","var(--green)")}
      ${cat("Dairy","240",".16","#3aa0ff")}
      ${cat("Household","210",".14","#a78bfa")}
      ${cat("Produce","150",".10","#f79009")}
      ${cat("Snacks","80",".05","#f472b6")}
    </div>
    <div class="card">
      <div class="tiny muted" style="font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Recent purchases</div>
      <div class="listrow"><div class="avatar">🧾</div><div><div class="n">Carrefour trip</div><div class="tiny muted">12 items · 9 Jul</div></div><span class="amt mono">AED 143.50</span></div>
      <div class="listrow"><div class="avatar">🥛</div><div><div class="n">Milk 2L</div><div class="tiny muted">Carrefour · 7 Jul</div></div><span class="amt mono">AED 5.75</span></div>
      <div class="listrow"><div class="avatar">🍌</div><div><div class="n">Bananas 1kg</div><div class="tiny muted">Lulu · 5 Jul</div></div><span class="amt mono">AED 6.20</span></div>
    </div>
    <button class="btn btn-lite" onclick="toast('Budget editor (mockup)')">Set / change budget</button>
  `
};
function cat(name,aed,w,color){return `<div class="catrow"><div class="top"><span>${name}</span><span class="mono muted">AED ${aed}</span></div><div class="bar"><i style="width:${(+w*100)}%;background:${color}"></i></div></div>`;}

/* ---------- Shelf-price verdict ---------- */
function bindShelf(){checkShelf();}
function checkShelf(){
  const v=parseFloat(document.getElementById("shelf").value||"0");
  const avg=5.60,best=4.99,el=document.getElementById("verdict");
  let html;
  if(!v){html="";}
  else if(v<=best*1.03){html=`<span class="pill pill-green" style="font-size:14px;padding:8px 14px">🟢 Great price — at or below your best ever</span>`;}
  else if(v<avg*0.97){html=`<span class="pill pill-green" style="font-size:14px;padding:8px 14px">✓ Cheaper than usual</span>`;}
  else if(v<=avg*1.03){html=`<span class="pill pill-amber" style="font-size:14px;padding:8px 14px">≈ About the same as usual</span>`;}
  else{html=`<span class="pill pill-red" style="font-size:14px;padding:8px 14px">↑ Pricier than usual — maybe wait</span>`;}
  el.innerHTML=html;
}

/* ---------- Receipt flow ---------- */
const SAMPLE=[
  ["Masafi Water 1.5L ×6","🧴","29.94"],["Almarai Cream 1L ×2","🥛","18.99"],
  ["Al Rawabi Yoghurt 400g","🥛","8.89"],["Brown Bread","🍞","4.33"],
  ["Eggplant ~0.6kg","🍆","4.12"],["Bakery Fillet 250g","🥐","2.19"],
  ["Spaghetti 400g ×3","🍝","8.49"],["Nesquik 330g ×3","🍫","1.50"],
  ["Honey Tea 360ml","🍯","7.99"],["Extra Gum 84g","🍬","0.45"]
];
function openReceipt(){document.getElementById("sheet").classList.add("show");sheetStep(1);}
function closeSheet(){document.getElementById("sheet").classList.remove("show");}
function sheetStep(n){
  const b=document.getElementById("sheetBody"),t=document.getElementById("sheetTitle");
  if(n===1){t.textContent="Import receipt";
    b.innerHTML=`<div class="drop"><div class="big">📄</div><p><b>Choose your Carrefour PDF</b><br><span class="tiny">the one they email you</span></p></div>
      <p class="tiny muted" style="text-align:center;margin:14px 0">🔒 Read on your device. Nothing personal is stored — just item names & prices.</p>
      <button class="btn btn-primary" onclick="sheetStep(2)">Use sample receipt →</button>`;}
  if(n===2){t.textContent="Reading receipt…";
    b.innerHTML=`<div style="text-align:center;padding:40px 0"><div class="spin"></div><p class="muted" style="margin-top:16px">Finding items & prices…</p></div>`;
    setTimeout(()=>sheetStep(3),1200);}
  if(n===3){t.textContent="Review & save";
    const total=SAMPLE.reduce((s,i)=>s+parseFloat(i[2]),0).toFixed(2);
    b.innerHTML=`<div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
        <span class="pill pill-green">Found ${SAMPLE.length} items</span>
        <span class="pill pill-green">Total matches receipt ✓</span></div>
      <p class="tiny muted">Glance down, fix anything odd, then save the whole trip.</p>
      <div class="card" style="padding:6px 14px">
        ${SAMPLE.map(i=>`<div class="listrow"><div class="avatar">${i[1]}</div><div class="n" style="flex:1">${i[0]}</div><span class="amt mono">AED ${i[2]}</span></div>`).join("")}
      </div>
      <div style="display:flex;justify-content:space-between;font-weight:800;font-size:18px;margin:4px 4px 16px">
        <span>Trip total</span><span class="mono">AED ${total}</span></div>
      <button class="btn btn-primary" onclick="closeSheet();toast('Saved ${SAMPLE.length} items ✓')">Save ${SAMPLE.length} items</button>`;}
}

/* init */
go("log");
</script>
<script src="theme.js"></script>
</body>
</html>
