<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="refresh" content="60" />
<title>Shelfie — Build Progress</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script>(function(){try{var t=localStorage.getItem('shelfie-theme');if(!t)t=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="stylesheet" href="shelfie.css" />
<style>
  .wrap{max-width:720px;margin:0 auto;padding:52px 20px 80px}
  .nav{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
  .nav a{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 14px;text-decoration:none;color:var(--green-strong);font-weight:700;font-size:14px}
  h1{font-size:clamp(32px,6vw,46px);margin:6px 0 4px}
  .sub{color:var(--ink-soft);font-size:16px;margin:0 0 22px}
  .barwrap{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-bottom:8px}
  .barwrap .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .barwrap .pct{font-family:var(--font-display);font-size:30px;font-weight:600}
  .bar{height:12px;border-radius:999px;background:var(--line-soft);overflow:hidden}
  .bar>i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--green),var(--green-strong));transition:width .5s}
  .phase{font-size:13px;color:var(--ink-faint);margin:22px 2px 8px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
  .task{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:14px 16px;margin:8px 0;box-shadow:var(--shadow-sm)}
  .task .ic{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:15px;flex:none;font-weight:800}
  .task.done .ic{background:var(--green-soft);color:var(--green-strong)}
  .task.active .ic{background:var(--amber-soft);color:var(--amber);animation:spin 1.4s linear infinite}
  .task.todo .ic{background:var(--line-soft);color:var(--ink-faint)}
  @keyframes spin{to{transform:rotate(360deg)}}
  .task .n{font-weight:700}.task .n small{display:block;font-weight:500;color:var(--ink-soft);font-size:13px;margin-top:1px}
  .task .st{margin-left:auto;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:4px 10px;border-radius:999px}
  .task.done .st{background:var(--green-soft);color:var(--green-strong)}
  .task.active .st{background:var(--amber-soft);color:var(--amber)}
  .task.todo .st{background:var(--line-soft);color:var(--ink-faint)}
  .foot{margin-top:34px;color:var(--ink-faint);font-size:13px;text-align:center}
  .live{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--green-strong)}
  .live i{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
  <button class="theme-toggle" aria-label="Toggle light/dark"><span class="moon">🌙</span><span class="sun">☀️</span></button>
  <div class="wrap">
    <div class="nav"><a href="index.html">← Hub</a><a href="spec.html">Spec</a><a href="review.html">🛡️ Review</a><a href="mockup.html">📱 Mockup</a></div>
    <h1>Build Progress</h1>
    <p class="sub">Core — Plan 1 of 3. <span class="live"><i></i>live · auto-refreshes every 60s</span></p>

    <div class="barwrap">
      <div class="top"><span style="font-weight:700">Deployable core</span><span class="pct" id="pct">0%</span></div>
      <div class="bar"><i id="fill" style="width:0%"></i></div>
      <div id="count" style="color:var(--ink-soft);font-size:13px;margin-top:8px"></div>
    </div>

    <div id="list"></div>

    <p class="foot">Each task is built test-first by a fresh Opus agent, then passes a spec-compliance review and a code-quality review before it turns green.<br>Next: parser (Plan 2) → polish (Plan 3).</p>
  </div>

<script>
const TASKS=[
 {id:0, n:"Scaffold Next.js app", d:"Next 15 + TS + Tailwind + Vitest", s:"done"},
 {id:1, n:"Money utilities", d:"fils ⇄ AED, no rounding drift", s:"done"},
 {id:2, n:"Dubai-time date bucketing", d:"correct month across midnight (+4)", s:"done"},
 {id:3, n:"Price stats + shelf verdict", d:"unit-price math, offers excluded, min-sample", s:"done"},
 {id:4, n:"Item name resolution", d:"exact / suggest / new — keep identity clean", s:"done"},
 {id:5, n:"Database schema + seed", d:"6 tables on Neon Postgres", s:"done"},
 {id:6, n:"PIN auth", d:"hash + throttle + httpOnly session", s:"done"},
 {id:7, n:"App shell + tab bar", d:"Log / Prices / Month, theme toggle", s:"done"},
 {id:8, n:"Log tab — manual entry", d:"add purchase + item-identity confirm", s:"done"},
 {id:9, n:"Prices + Month tabs", d:"price story, verdict, budget, breakdown", s:"done"},
 {id:10,n:"Data export + deploy", d:"one-tap export, live on Vercel, verified", s:"done"},
 {id:11,n:"Auto-update + version stamp", d:"one-tap update, build timestamp, installable PWA", s:"done"},
 {id:12,n:"Edit / delete logged purchases", d:"fix price/qty/store/date, delete with confirm", s:"done"},
 {id:13,n:"Safety fixes (from code review)", d:"reject blank/zero price · fail-fast on missing session secret", s:"done"},
 {id:14,n:"Backup & Restore + version card", d:"safe import/export, snapshot+undo, last-backed-up nudge", s:"done"},
 {id:15,n:"Proper home-screen app icon", d:"PNG apple-touch-icon + maskable icons for real install", s:"done"},
 {id:16,n:"UX fixes: autocomplete + instant prices", d:"reliable mobile typeahead · price story loads on select", s:"done"}
];
const done=TASKS.filter(t=>t.s==="done").length, pct=Math.round(done/TASKS.length*100);
document.getElementById("pct").textContent=pct+"%";
document.getElementById("fill").style.width=pct+"%";
document.getElementById("count").textContent=`${done} of ${TASKS.length} tasks complete`;
document.getElementById("list").innerHTML=TASKS.map(t=>`
  <div class="task ${t.s}">
    <div class="ic">${t.s==="done"?"✓":t.s==="active"?"◐":t.id}</div>
    <div class="n">${t.n}<small>${t.d}</small></div>
    <div class="st">${t.s==="done"?"Done":t.s==="active"?"Building":"Queued"}</div>
  </div>`).join("");
</script>
<script src="theme.js"></script>
</body>
</html>
