<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Shelfie">
  <!-- Solid full-bleed fresh-green background. No transparency, no rounded
       corners: iOS/Android mask the corners themselves. -->
  <rect width="512" height="512" fill="#1f9d57"/>
  <!-- Bold, centred white shopping-cart glyph. Body drawn as one continuous
       stroked path (handle -> basket) with two solid wheels beneath. -->
  <g fill="none" stroke="#ffffff" stroke-width="30" stroke-linecap="round" stroke-linejoin="round">
    <path d="M96 138 h46 l42 196 a24 24 0 0 0 23 18 h146 a24 24 0 0 0 23 -17 l36 -136 H176"/>
  </g>
  <circle cx="214" cy="398" r="25" fill="#ffffff"/>
  <circle cx="366" cy="398" r="25" fill="#ffffff"/>
</svg>
